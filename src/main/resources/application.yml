spring:
  application:
    name: task-management

server:
  port: 8080

aws:
  region: us-east-1
  dynamodb:
    endpoint: http://dynamodb-local:8000
    access-key: local
    secret-key: local
    table-name: tasks

logging:
  level:
    com.taskmanagent: DEBUG
    software.amazon.awssdk: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method